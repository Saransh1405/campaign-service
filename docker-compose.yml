version: "3"

networks:
  app-tier:
    driver: bridge

services:
  golang-zee-api:
    image: appscrip007/golang-zee-api
    container_name: golang-zee-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    volumes:
      - /usr/etc/.env_zee_api:/app/.env
    ports:
      - "8001:8001"
    networks:
      - app-tier
    logging:
      options:
        max-size: "1m"
        max-file: "3"
